    <h1>Image Encryption & Decryption</h1>

    <!-- Base64 Image Encryption -->
    <div class="method">
        <h2>Base64 Image Encryption</h2>

        <div class="sub-method">
            <h3>Encrypt Image</h3>
            <input type="file" class="base64-image-input">
            <button onclick="encryptBase64Image()">Encrypt</button>
            <textarea class="base64-encrypted-output" readonly placeholder="Encrypted Base64 image..."></textarea>

            <h3>Decrypt Image</h3>
            <textarea class="base64-decryption-input" placeholder="Enter Base64 encrypted image..."></textarea>
            <button onclick="decryptBase64Image()">Decrypt</button>
            <img id="base64-image-output" alt="Decrypted Image" style="display: none;">
            <a id="base64-download-link" style="display: none;">Download Decrypted Image</a>
        </div>
    </div>
