<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.ko-fi.com; connect-src 'self' https://cdn.jsdelivr.net; worker-src 'self' blob:;">
    <!-- Clickjacking Defense (Frame-Busting) -->
    <style id="antiClickjack">body{display:none !important;}</style>
    <script type="text/javascript">
        if (self === top) {
            var antiClickjack = document.getElementById("antiClickjack");
            if (antiClickjack) antiClickjack.parentNode.removeChild(antiClickjack);
        } else {
            top.location = self.location;
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Translator — Cryptic Fox</title>
    <link rel="stylesheet" href="style.css">

    <!-- Favicon Links -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">

    <meta name="description"
        content="Translate between the standard alphabet and the TEP Cipher — a custom 26-symbol substitution cipher used in The End Project.">
    <link rel="canonical" href="https://cryptic-fox.com/tepcipher.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cryptic-fox.com/tepcipher.html">
    <meta property="og:title" content="Cipher Translator — Cryptic Fox">
    <meta property="og:description" content="Translate between the alphabet and the TEP Cipher.">
    <meta property="og:image" content="https://cryptic-fox.com/images/Fox-Thumbnail.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Cipher Translator — Cryptic Fox">
    <meta name="twitter:description" content="Translate between the alphabet and the TEP Cipher.">
    <meta name="twitter:image" content="https://cryptic-fox.com/images/Fox-Thumbnail.png">

    <script src="js/components.js"></script>
    <script src="js/script.js" defer></script>
    <script src="js/smoke.js" defer></script>
</head>

<body class="tep-page smoke-bg">
    <div class="dropdown" role="navigation" aria-label="Site navigation"></div>
    <!-- Foxy Input Screen -->
    <div id="foxScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                display: flex; flex-direction: column; justify-content: center; align-items: center;
                background: radial-gradient(circle at center, #2b2e33 0%, #0f1115 100%);
                z-index: 10; opacity: 1; transition: z-index 0.5s, opacity 0.5s; overflow: hidden;">

        <img src="images/fennfox.png" class="center-image" alt=""
            style="width: 150px; height: auto; z-index: 1; filter: drop-shadow(0 0 20px rgba(68, 125, 155, 0.5)); position: relative;">
        <input type="text" id="foxInput" placeholder="..." class="fox-box"
            style="width: 150px; text-align: center; z-index: 1; position: relative;
                      background: rgba(20, 20, 20, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
                      border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">

        <button id="submitFox" onclick="checkFox()"
            style="width: 120px; z-index: 1; position: relative; margin-top: 10px;">
            Submit
        </button>
    </div>



    <!-- Quick Translator Section -->
    <section class="quick-translator" id="translator">
        <img src="images/fennfox.png" class="hero-logo" alt="AEON LOGIC">
        <h1 class="section-title">⏁⋑∷⚲Ϟ ⌖⎐⟒〄Ϩ⌇⟒⌖◎⎐</h1>
        <div class="translator-container">
            <textarea id="inputText" placeholder="Enter text here..."></textarea>
            <div id="keyboardPanel"></div>
            <div class="translator-buttons">
                <button onclick="translateToAlphabet()">⟶ To Alphabet</button>
                <button onclick="translateToCipher()">⟶ To Cipher</button>
                <button onclick="clearFields()">Clear</button>
            </div>
            <textarea id="outputText" readonly placeholder="Translation..."></textarea>
            <textarea id="alternativeOutputText" readonly placeholder="Alternative Translation..."></textarea>
        </div>
    </section>

    <!-- Ad Placement Scaffolding 
    <div class="ad-scaffold">
        <span class="ad-label">Sponsored Placement</span>
    </div>-->

    <!-- Footer Section -->
    <footer></footer>
</body>

</html>
