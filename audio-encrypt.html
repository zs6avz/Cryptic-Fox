<body class="decrypt-page">
    <div class="dropdown" role="navigation" aria-label="Site navigation"></div>
    <h1>Audio Encryption & Decryption</h1>

    <!-- AES Audio Encryption -->
    <div class="method">
        <h2>AES-256-GCM Audio Encryption</h2>
        <div class="sub-method">
            <h3>Encrypt Audio</h3>
            <input type="file" class="aes-audio-input">
            <input type="password" class="aes-audio-key" placeholder="Enter password (AES-256-GCM + PBKDF2)">
            <button id="aesEncryptBtn">Encrypt</button>
            <textarea class="aes-encrypted-output" readonly placeholder="Encrypted audio data..."></textarea>

            <div class="button-group" style="display: flex; gap: 10px; margin: 15px 0; justify-content: center;">
                <button id="copyAudioBtn" class="tool-btn">📋 Copy</button>
                <button id="swapAudioBtn" class="tool-btn">⇄ Swap</button>
                <button id="clearAudioBtn" class="tool-btn">Clear</button>
            </div>

            <h3>Decrypt Audio</h3>
            <textarea class="aes-audio-input-decrypt" placeholder="Enter AES encrypted audio data..."></textarea>
            <input type="password" class="aes-audio-key-decrypt" placeholder="Enter password">
            <button id="aesDecryptBtn">Decrypt</button>
            <audio id="aes-audio-output" controls></audio>
            <a id="aes-audio-download-link" style="display: none;">Download Decrypted Audio</a>
        </div>
    </div>

    <!-- RSA Audio Encryption (Web Crypto API) -->
    <div class="method">
        <h2>RSA Audio Encryption (Asymmetric)</h2>
        
        <!-- Key Management -->
        <div class="sub-method">
            <h3>1. RSA Key Management</h3>
            <div class="button-group">
                <button id="generateRSABtn">Generate New Key Pair</button>
            </div>
            <div class="key-display">
                <div class="key-box">
                    <label>Your Public Key (Share this)</label>
                    <textarea id="rsa-public-key-display" placeholder="Public Key will appear here..." readonly></textarea>
                    <button id="copyPublicKeyBtn" class="small-btn">Copy Public Key</button>
                </div>
                <div class="key-box">
                    <label>Your Private Key (KEEP SECRET)</label>
                    <textarea id="rsa-private-key-display" placeholder="Private Key will appear here..." readonly></textarea>
                    <button id="copyPrivKeyBtn" class="small-btn">Copy Private Key</button>
                </div>
            </div>
        </div>

        <!-- Encryption -->
        <div class="sub-method">
            <h3>2. Encrypt Audio (Using Recipient's Public Key)</h3>
            <input type="file" id="rsa-audio-input">
            <textarea id="rsa-recipient-public-key" placeholder="Paste Recipient's Public Key here..."></textarea>
            <button id="rsaEncryptBtn">Encrypt with RSA</button>
            <textarea id="rsa-encrypted-output" readonly placeholder="RSA Encrypted data will appear here..."></textarea>
            <button id="copyRSAOutputBtn" class="small-btn">Copy Encrypted Data</button>
        </div>

        <!-- Decryption -->
        <div class="sub-method">
            <h3>3. Decrypt Audio (Using Your Private Key)</h3>
            <textarea id="rsa-audio-input-decrypt" placeholder="Paste RSA encrypted audio data here..."></textarea>
            <textarea id="rsa-my-private-key" placeholder="Paste Your Private Key here..."></textarea>
            <button id="rsaDecryptBtn">Decrypt with RSA</button>
            <div id="rsa-decrypt-status" style="margin-top: 10px; font-size: 0.9rem;"></div>
            <audio id="rsa-audio-output" controls></audio>
            <a id="rsa-audio-download-link" style="display: none;" class="primary-btn">Download Decrypted Audio</a>
        </div>
    </div>

    <footer></footer>

</body>

</html>
